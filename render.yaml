services:
  - type: web
    name: queen-x-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PREFIX
        value: "."
      - key: MODE
        value: "public"
      - key: SESSION_ID
        sync: false
      - key: NODE_ENV
        value: "production"
